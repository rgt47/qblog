# Controlled Vocabulary for Thomas Lab Blog
# Last updated: 2026-02-16
#
# Usage: Select keywords from this list when tagging blog posts.
# Use lowercase, hyphenated terms consistently.
# Maximum 10 keywords per post recommended.

# =============================================================================
# PROGRAMMING LANGUAGES
# =============================================================================
languages:
  - r                     # R statistical programming
  - python                # Python programming
  - julia                 # Julia programming
  - bash                  # Shell scripting (bash/zsh)
  - lua                   # Lua scripting (neovim configs)
  - sql                   # Database queries
  - javascript            # JavaScript/Observable
  - latex                 # LaTeX typesetting
  - vimscript             # Vim scripting

