# Directory-level metadata for posts/
#
# Settings here cascade to every post under posts/ and may be overridden
# by per-post YAML front matter. Defining the PDF format here makes
# every post produce both an HTML and a PDF output by default, which
# in turn surfaces the 'Download PDF' banner injected by
# _includes/after-body.html.

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl
    toc: true
    number-sections: true
    colorlinks: true
    papersize: letter
    geometry:
      - margin=1in
    monofont: 'DejaVu Sans Mono'
    code-overflow: wrap
    code-block-bg: true
    # Do not invoke tlmgr to auto-install LaTeX packages when xelatex
    # encounters a missing file. tlmgr update requires write access
    # to /usr/local/texlive/.../tlpkg which the user does not have,
    # and Quarto misinterprets missing image files as missing
    # packages. Setting this to false lets the build emit a clean
    # LaTeX warning and continue rather than crashing the project
    # render.
    latex-auto-install: false
