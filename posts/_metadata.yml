# Directory-level metadata for posts/
#
# Settings here cascade to every post under posts/ and may be overridden
# by per-post YAML front matter. Defining the PDF format here makes
# every post produce both an HTML and a PDF output by default, which
# in turn surfaces the 'Download PDF' banner injected by
# _includes/after-body.html.

format:
  pdf:
    pdf-engine: xelatex
    documentclass: scrartcl
    toc: true
    number-sections: true
    colorlinks: true
    papersize: letter
    geometry:
      - margin=1in
    monofont: 'DejaVu Sans Mono'
    code-overflow: wrap
    code-block-bg: true
