# ~/.gnupg/gpg-agent.conf
# Reference configuration for pass on macOS (Apple Silicon).
# Copy to ~/.gnupg/gpg-agent.conf, then reload:
#   gpg-connect-agent reloadagent /bye
#
# For Intel Macs, replace /opt/homebrew with /usr/local.

pinentry-program /opt/homebrew/bin/pinentry-mac

# Passphrase cache window (seconds).
# default-cache-ttl: how long after last use before re-prompt.
# max-cache-ttl: absolute ceiling regardless of use.
default-cache-ttl 300
max-cache-ttl 600
