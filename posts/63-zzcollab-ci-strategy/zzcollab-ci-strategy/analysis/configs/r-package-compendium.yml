# Compendia CI v1.0 (new-generation)
#
# Tiered validate+check workflow for a LaTeX-rendering research
# compendium. The companion render-report.yml handles Tier 3
# (manuscript render).
#
#   validate : Tier 1 -- environment integrity (renv synchronized check)
#   check    : Tier 2 -- R CMD check via check-r-package
#
# See zzcollab/docs/ci-strategy-tiered-model.md for rationale.

name: Package Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:

  validate:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: 'renv'

      - uses: r-lib/actions/setup-renv@v2

      - name: Report renv status (fail on inconsistency)
        shell: Rscript {0}
        run: |
          status <- renv::status()
          if (!isTRUE(status$synchronized)) {
            cat("\n",
                "renv reports the project is not synchronized.\n",
                "Run renv::snapshot() locally and commit ",
                "the updated renv.lock.\n",
                sep = "")
            quit(status = 1)
          }
          cat("\nrenv: lockfile, library, and source are synchronized.\n")

      - name: zzrenvcheck audit (optional)
        shell: Rscript {0}
        run: |
          if (requireNamespace('zzrenvcheck', quietly = TRUE)) {
            zzrenvcheck::check_packages()
          } else {
            cat('zzrenvcheck not installed; skipping audit.\n')
          }

  check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          r-version: 'renv'

      - uses: r-lib/actions/setup-renv@v2

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
