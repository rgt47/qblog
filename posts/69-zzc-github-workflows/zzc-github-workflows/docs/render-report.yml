# render-report.yml
#
# Builds the project Docker image and renders all report.Rmd files
# found under analysis/. Triggered on pushes and PRs to main/master
# when analysis files, R code, renv.lock, or Dockerfile change.
#
# Workspace types: manuscript-package only.
# Not needed for data-analysis or blog-post compendia.
#
name: Render Reports

on:
  push:
    branches: [main, master]
    paths:
      # Trigger on manuscript or R code changes, or infrastructure
      # changes that could affect rendering.
      - 'analysis/**'
      - 'R/**'
      - 'renv.lock'
      - 'Dockerfile'
      - '.github/workflows/render-report.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'analysis/**'
      - 'R/**'
      - 'renv.lock'
      - 'Dockerfile'

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Required to build multi-platform Docker images on GitHub runners.
      - uses: docker/setup-buildx-action@v3

      # Build the project's own Docker image (not rocker/tidyverse
      # directly). This ensures the rendered output reflects the exact
      # environment in the repo's Dockerfile.
      - name: Build Docker image
        run: |
          docker build -t compendium-env .

      # Run renv::restore() inside the container, then render every
      # report.Rmd found under analysis/. Each Rmd is rendered from
      # its own directory so that relative paths resolve correctly.
      # Failed renders are collected and reported; the step exits
      # non-zero if any render failed.
      - name: Restore packages and render all manuscripts
        run: |
          docker run --rm -e CI=true \
            -v ${{ github.workspace }}:/project \
            -w /project compendium-env \
            Rscript -e '
              renv::restore()
              rmds <- list.files(
                "analysis", pattern = "^report[.]Rmd$",
                recursive = TRUE, full.names = TRUE
              )
              cat("Found", length(rmds), "manuscripts\n\n")
              failed <- character()
              for (rmd in rmds) {
                cat("=== Rendering:", rmd, "===\n")
                old_wd <- setwd(dirname(rmd))
                tryCatch(
                  rmarkdown::render(basename(rmd)),
                  error = function(e) {
                    cat("FAILED:", conditionMessage(e), "\n")
                    failed <<- c(failed, rmd)
                  }
                )
                setwd(old_wd)
              }
              cat("\n=== summary ===\n")
              cat("rendered:", length(rmds) - length(failed), "\n")
              cat("failed:  ", length(failed), "\n")
              if (length(failed) > 0) {
                for (f in failed) cat("  ", f, "\n")
                quit(status = 1)
              }
            '

      # Upload all rendered PDFs as a build artifact. Warns (rather
      # than fails) if no PDFs are found, so the workflow is safe in
      # repos where manuscripts are work-in-progress.
      - name: Upload rendered PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-manuscripts
          path: |
            analysis/**/*.pdf
          retention-days: 30
          if-no-files-found: warn
